name: Update Daily News

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 */3 * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pyyaml beautifulsoup4 requests

      - name: Fetch feed items
        run: python scripts/fetch_daily_news.py --limit 80 --per-source 10 --days 14

      - name: Commit updated news data
        run: |
          if git diff --quiet -- _data/daily_news.yml; then
            echo "No daily news changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/daily_news.yml
          git commit -m "Update daily news"
          git push
